{% extends 'base.html' %}

{% block title %}Confirmar Exclusão{% endblock %}

{% block content %}
    <h1>Confirmar Exclusão</h1>
    <hr>
    <p>Você tem certeza que deseja excluir o usuário <strong>"{{ objeto.username }}"</strong>?</p>
    <p class="text-danger">Esta ação não pode ser desfeita.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sim, Excluir</button>
        <a href="{% url 'Auth:lista_usuarios' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
