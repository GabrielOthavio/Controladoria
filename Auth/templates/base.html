<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Auditoria{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* ========================================
           DESIGN SYSTEM - Variáveis CSS
           ======================================== */
        :root {
            /* Paleta de Cores Principal */
            --primary-color: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #60a5fa;
            
            --secondary-color: #64748b;
            --secondary-dark: #475569;
            
            --success-color: #10b981;
            --success-dark: #059669;
            
            --danger-color: #ef4444;
            --danger-dark: #dc2626;
            
            --warning-color: #f59e0b;
            --info-color: #06b6d4;
            
            /* Cores Neutras */
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            
            /* Tipografia */
            --font-primary: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            
            /* Espaçamentos */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
            
            /* Sombras */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            
            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            
            /* Transições */
            --transition-fast: 150ms ease-in-out;
            --transition-normal: 250ms ease-in-out;
            --transition-slow: 350ms ease-in-out;
        }
        
        /* ========================================
           ESTILOS GLOBAIS
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-primary);
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.6;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
        
        /* ========================================
           MELHORIAS DE CONTAINER
           ======================================== */
        main.container {
            animation: fadeIn 0.4s ease-in-out;
            padding-top: var(--spacing-xl);
            padding-bottom: var(--spacing-2xl);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ========================================
           CARDS - Melhorias Gerais
           ======================================== */
        .card {
            border: none;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal);
            background: white;
        }
        
        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important;
            padding: var(--spacing-lg);
            font-weight: var(--font-weight-semibold);
        }
        
        .card-body {
            padding: var(--spacing-xl);
        }
        
        /* ========================================
           BOTÕES - Melhorias de UX
           ======================================== */
        .btn {
            font-weight: var(--font-weight-medium);
            border-radius: var(--radius-md);
            padding: 0.625rem 1.25rem;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
        }
        
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark), #1e3a8a);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), var(--success-dark));
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color), var(--danger-dark));
        }
        
        /* ========================================
           FORMULÁRIOS - Melhor Acessibilidade
           ======================================== */
        .form-label {
            font-weight: var(--font-weight-medium);
            color: var(--gray-700);
            margin-bottom: var(--spacing-sm);
        }
        
        .form-control, .form-select {
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            transition: all var(--transition-fast);
            font-size: 0.95rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(37, 99, 235, 0.15);
        }
        
        /* ========================================
           TABELAS - Modernização
           ======================================== */
        .table {
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .table thead {
            background: linear-gradient(135deg, var(--gray-700), var(--gray-800));
            color: white;
        }
        
        .table thead th {
            border: none;
            padding: 1rem;
            font-weight: var(--font-weight-semibold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .table tbody tr {
            transition: background-color var(--transition-fast);
        }
        
        .table tbody tr:hover {
            background-color: var(--gray-50);
        }
        
        /* ========================================
           FOOTER - Melhorias Visuais
           ======================================== */
        footer {
            background: linear-gradient(135deg, var(--gray-800), var(--gray-900));
            color: var(--gray-200);
            margin-top: auto;
            box-shadow: var(--shadow-lg);
        }
        
        footer p {
            margin: 0;
            font-size: 0.9rem;
        }
        
        /* ========================================
           BADGES - Melhor Contraste
           ======================================== */
        .badge {
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            font-weight: var(--font-weight-medium);
        }
        
        /* ========================================
           BREADCRUMBS - Melhor Navegação
           ======================================== */
        .breadcrumb {
            background: white;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }
        
        .breadcrumb-item a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        
        .breadcrumb-item a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }
        
        /* ========================================
           ALERTAS - Melhor Feedback Visual
           ======================================== */
        .alert {
            border: none;
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
        }
        
        /* ========================================
           RESPONSIVIDADE
           ======================================== */
        @media (max-width: 768px) {
            .card-body {
                padding: var(--spacing-lg);
            }
            
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    
    {% include 'partials/_navbar.html' %}

    <main class="container mt-4 flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center mt-5 py-4">
        <div class="container">
            <p class="mb-1">
                <i class="bi bi-shield-check me-2"></i>
                <strong>Sistema de Auditoria</strong> - Todos os direitos reservados
            </p>
            <p class="mb-0 small">
                &copy; 2025 | Desenvolvido com 
                <i class="bi bi-heart-fill text-danger"></i> 
                para excelência em auditoria
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
