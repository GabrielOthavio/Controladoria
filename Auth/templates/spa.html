{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controladoria — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'Auth/css/design-system.css' %}">
<script>
(function(){
  try {
    var t = JSON.parse(localStorage.getItem('app_tweaks')||'{}');
    document.documentElement.setAttribute('data-theme',   t.theme   || 'dark');
    document.documentElement.setAttribute('data-density', t.density || 'compact');
    if (t.accentH) document.documentElement.style.setProperty('--accent-h', t.accentH);
  } catch(e){}
})();
</script>
</head>
<body>
<div id="root"></div>
<script>
  window.CSRF_TOKEN = '{{ csrf_token }}';
  window.CURRENT_USER = {
    username: '{{ request.user.username }}',
    fullName: '{{ request.user.get_full_name }}',
    perfil:   '{{ request.user.perfil }}',
    isChefe:  '{{ request.user.perfil }}' === 'CHEFE',
  };
  window.APP_DEFAULTS = {
    theme:           'dark',
    density:         'compact',
    accent:          'indigo',
    sidebarCollapsed: false,
  };
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"    crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"    crossorigin="anonymous"></script>
<script type="text/babel" src="{% static 'Auth/src/data.jsx' %}"></script>
<script type="text/babel" src="{% static 'Auth/src/shell.jsx' %}"></script>
<script type="text/babel" src="{% static 'Auth/src/dashboard.jsx' %}"></script>
<script type="text/babel" src="{% static 'Auth/src/lists.jsx' %}"></script>
<script type="text/babel" src="{% static 'Auth/src/tweaks.jsx' %}"></script>
<script type="text/babel" src="{% static 'Auth/src/app.jsx' %}"></script>
</body>
</html>
